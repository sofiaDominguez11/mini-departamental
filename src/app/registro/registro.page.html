<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Crear Cuenta Walmart</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="ion-text-center ion-margin-bottom" style="margin-top: 20px;">
    
    <img src="assets/walmart.png" 
         class="logo-walmart" 
         alt="Walmart Logo"
         style="width: 120px; height: auto  ; margin: 0 auto;">

    <h2 style="font-weight: bold; margin-top: 20px; color: var(--ion-color-dark);">¡Únete a nosotros!</h2>
    <p style="color: #666;">Crea tu cuenta para empezar a comprar</p>
  </div>

  <ion-list lines="inset" style="background: transparent;">
    <ion-item style="--background: transparent;">
      <ion-label position="floating">Correo Electrónico</ion-label>
      <ion-input type="email" [(ngModel)]="newUser.email" placeholder="ejemplo@correo.com"></ion-input>
    </ion-item>

    <ion-item style="--background: transparent;">
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" [(ngModel)]="newUser.password" placeholder="Mínimo 6 caracteres"></ion-input>
    </ion-item>
  </ion-list>

  <div class="ion-padding-top">
    <ion-button expand="block" shape="round" (click)="registrar()" color="primary" class="ion-margin-top">
      Registrarme
    </ion-button>
    
    <ion-button expand="block" fill="clear" routerLink="/login" color="medium">
      ¿Ya tienes cuenta? <strong style="margin-left: 5px; color: var(--ion-color-primary);">Inicia Sesión</strong>
    </ion-button>
  </div>
</ion-content>
