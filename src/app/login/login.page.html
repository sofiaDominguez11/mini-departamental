<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>Walmart - Acceso</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="login-container ion-text-center">
    <div class="ion-padding">
      <ion-icon name="person-circle-outline" style="font-size: 80px; color: var(--ion-color-primary);"></ion-icon>
      <h2>Bienvenido</h2>
      <p>Inicia sesión para continuar</p>
    </div>

    <ion-list lines="inset">
      <ion-item>
        <ion-label position="floating">Correo</ion-label>
        <ion-input type="email" [(ngModel)]="user.email" placeholder="tu@correo.com"></ion-input>
      </ion-item>

      <ion-item>
        <ion-label position="floating">Contraseña</ion-label>
        <ion-input type="password" [(ngModel)]="user.password" placeholder="******"></ion-input>
      </ion-item>
    </ion-list>

    <div class="ion-padding-top">
      <ion-button expand="block" shape="round" (click)="ingresar()" class="ion-margin-top">
        Entrar
      </ion-button>

      <ion-button expand="block" fill="clear" routerLink="/registro" class="ion-margin-top">
        ¿No tienes cuenta? <strong style="margin-left: 5px;">Regístrate aquí</strong>
      </ion-button>
    </div>
  </div>
</ion-content>
