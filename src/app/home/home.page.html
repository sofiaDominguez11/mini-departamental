<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

    <div style="display: flex; align-items: center; background: white; border-radius: 20px; padding: 0 10px; height: 34px; margin: 0 5px;">
      <div style="display: flex; align-items: center; border-right: 1px solid #ccc; padding-right: 8px; margin-right: 8px; flex-shrink: 0;">
        <img src="https://www.walmart.com/favicon.ico" style="height: 16px; width: 16px; margin-right: 4px;">
        <span style="color: #0071ce; font-weight: bold; font-size: 12px;">Walmart</span>
      </div>
      
      <ion-searchbar 
        placeholder="Buscar..." 
        (ionInput)="buscarProducto($event)"
        style="--background: transparent; --box-shadow: none; --padding-start: 0; height: 34px; padding: 0;"
        class="compact-search"
        animated="true"
        showCancelButton="never"
        mode="md">
      </ion-searchbar>
    </div>

    <ion-buttons slot="end">
      <ion-button routerLink="/carrito" style="position: relative;">
        <ion-icon name="cart-outline" style="font-size: 24px;"></ion-icon>
        <ion-badge color="danger" 
                   style="position: absolute; top: -5px; right: -5px; font-size: 10px;" 
                   *ngIf="dataService.getContadorCarrito() > 0">
          {{ dataService.getContadorCarrito() }}
        </ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-grid>
    <ion-row>
      <ion-col size="6" size-md="4" size-lg="3" *ngFor="let p of productosFiltrados">
        
        <ion-card (click)="verDetalle(p)" style="height: 250px; display: flex; flex-direction: column; margin: 6px;">
          
          <div style="background: white; padding: 10px; height: 140px; display: flex; align-items: center; justify-content: center;">
            <img [src]="p.image" style="max-height: 100%; width: auto; object-fit: contain;"/>
          </div>

          <ion-card-header style="padding: 8px; flex-grow: 1;">
            <ion-card-title style="font-size: 0.75rem; height: 2rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; line-height: 1rem;">
              {{ p.title }}
            </ion-card-title>
            <ion-card-subtitle color="success" style="font-weight: bold; font-size: 0.9rem; margin-top: 5px;">
              ${{ p.price }}
            </ion-card-subtitle>
          </ion-card-header>
          
        </ion-card>

      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
